<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samantha Quince — Guest Registry</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Great+Vibes&family=Montserrat:wght@200;300;400;600&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --emerald-deep:#001a0d;
  --emerald-dark:#003d26;
  --gold:#d4a843;
  --gold-bright:#f0d060;
  --gold-light:#e8cc7a;
  --gold-pale:#f5e6c8;
  --cream:#fdf8f0;
}
body{
  background:var(--emerald-deep);
  font-family:'Cormorant Garamond',serif;
  color:var(--cream);
  min-height:100vh;
}

/* Canvas particles */
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Language toggle */
.lang-toggle{
  position:fixed;top:24px;right:28px;z-index:150;
  display:flex;gap:3px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(212,168,67,0.3);border-radius:6px;
  overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.lang-toggle button{
  font-family:'Montserrat',sans-serif;font-size:0.65rem;letter-spacing:2px;
  padding:12px 20px;border:none;background:transparent;
  color:rgba(253,248,240,0.45);cursor:pointer;text-transform:uppercase;font-weight:600;
  transition:all 0.3s;
}
.lang-toggle button.active{background:linear-gradient(135deg,var(--gold),var(--gold-bright));color:var(--emerald-deep);box-shadow:0 0 20px rgba(212,168,67,0.3)}
.lang-toggle button:hover:not(.active){color:var(--gold-light)}

.lang-es,.lang-en{display:none}
body.lang-es .lang-es{display:block}
body.lang-en .lang-en{display:block}
body.lang-es .lang-es-i,body.lang-en .lang-en-i{display:inline}
.lang-es-i,.lang-en-i{display:none}

/* Layout */
.admin-container{position:relative;z-index:10;max-width:960px;margin:0 auto;padding:50px 24px 80px}

/* Header */
.admin-header{
  text-align:center;margin-bottom:40px;padding-bottom:28px;
  border-bottom:1px solid rgba(212,168,67,0.15);
}
.admin-header h1{
  font-family:'Great Vibes',cursive;font-size:3rem;
  color:transparent;
  background:linear-gradient(180deg,var(--gold-bright),var(--gold),var(--gold-light));
  -webkit-background-clip:text;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(212,168,67,0.4));
  font-weight:400;margin-bottom:4px;
}
.admin-header p{
  font-family:'Montserrat',sans-serif;font-size:0.65rem;
  letter-spacing:4px;color:var(--gold);text-transform:uppercase;
}

/* Stats */
.stats-bar{display:flex;gap:14px;margin-bottom:30px;flex-wrap:wrap}
.stat-card{
  flex:1;min-width:140px;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(212,168,67,0.15);
  padding:24px 16px;text-align:center;
  transition:all 0.3s;
}
.stat-card:hover{
  border-color:rgba(212,168,67,0.4);
  transform:translateY(-3px);
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}
.stat-num{font-family:'Cinzel',serif;font-size:2.6rem;font-weight:700;color:var(--gold-bright);line-height:1;text-shadow:0 0 15px rgba(212,168,67,0.4)}
.stat-label{font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-top:6px}

/* Actions */
.actions{display:flex;gap:12px;justify-content:center;margin-bottom:36px;flex-wrap:wrap}
.btn{
  font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:3px;
  text-transform:uppercase;font-weight:600;
  padding:12px 28px;border:1px solid rgba(212,168,67,0.25);
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  color:var(--gold);cursor:pointer;
  transition:all 0.3s;
}
.btn:hover{background:rgba(212,168,67,0.1);border-color:var(--gold)}
.btn.primary{background:linear-gradient(135deg,var(--gold),var(--gold-bright));color:var(--emerald-deep);border-color:var(--gold)}
.btn.primary:hover{box-shadow:0 8px 30px rgba(212,168,67,0.4);transform:translateY(-2px)}
.btn.primary:active{transform:scale(0.97)}
.btn.danger{border-color:rgba(248,113,113,0.25);color:#f87171}
.btn.danger:hover{background:rgba(248,113,113,0.1)}

/* Entry cards */
.entry-card{
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(212,168,67,0.1);
  padding:22px 28px;margin-bottom:12px;
  transition:all 0.3s;
}
.entry-card:hover{
  border-color:rgba(212,168,67,0.3);
  background:rgba(0,0,0,0.4);
  transform:translateX(4px);
}
.entry-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px}
.entry-name{font-size:1.3rem;color:var(--gold-light);font-weight:600}
.entry-badge{
  font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:3px;
  text-transform:uppercase;padding:5px 14px;border-radius:3px;
  font-weight:600;
}
.badge-yes{background:rgba(0,180,100,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.2)}
.badge-no{background:rgba(200,80,80,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.2)}
.badge-maybe{background:rgba(200,160,40,0.15);color:#facc15;border:1px solid rgba(250,204,21,0.2)}
.entry-details{margin-top:10px;font-size:0.95rem;color:rgba(253,248,240,0.65);display:flex;gap:24px;flex-wrap:wrap}
.entry-message{margin-top:10px;font-style:italic;color:rgba(253,248,240,0.45);font-size:0.95rem;padding:10px 0 0;border-top:1px solid rgba(212,168,67,0.08)}
.entry-time{font-family:'Montserrat',sans-serif;font-size:0.55rem;color:rgba(253,248,240,0.3);margin-top:10px;letter-spacing:1px}
.empty-state{text-align:center;padding:80px 20px;opacity:0.5}
.empty-state .icon{font-size:3.5rem;margin-bottom:16px;display:block}
.back-link{text-align:center;margin-top:40px;padding-top:24px;border-top:1px solid rgba(212,168,67,0.1);font-size:0.75rem;opacity:0.35;transition:opacity 0.3s}
.back-link:hover{opacity:0.7}
.back-link a{color:var(--gold-pale);text-decoration:none}

@media(max-width:600px){
  .stats-bar{flex-direction:column}
  .entry-top{flex-direction:column}
}
</style>
</head>
<body class="lang-es">

<canvas id="particle-canvas"></canvas>

<div class="lang-toggle">
  <button id="btn-es" class="active" onclick="setLang('es')">ES</button>
  <button id="btn-en" onclick="setLang('en')">EN</button>
</div>

<div class="admin-container">
  <div class="admin-header">
    <h1>Samantha</h1>
    <p><span class="lang-es">Registro de Invitados — Quince Años</span><span class="lang-en">Guest Registry — Sweet Fifteen</span></p>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <div class="actions">
    <button class="btn primary" onclick="exportCSV()">📥 <span class="lang-es-i">Exportar CSV</span><span class="lang-en-i">Export CSV</span></button>
    <button class="btn" onclick="refresh()">🔄 <span class="lang-es-i">Actualizar</span><span class="lang-en-i">Refresh</span></button>
    <button class="btn danger" onclick="wipe()">🗑️ <span class="lang-es-i">Limpiar Todo</span><span class="lang-en-i">Clear All</span></button>
  </div>

  <div id="entries"></div>

  <div class="back-link"><a href="invitation.html">← <span class="lang-es-i">Volver a la invitación</span><span class="lang-en-i">Back to invitation</span></a></div>
</div>

<script>
// Particles
const canvas=document.getElementById('particle-canvas');
const ctx=canvas.getContext('2d');
let w=canvas.width=innerWidth,h=canvas.height=innerHeight,p=[];
window.addEventListener('resize',()=>{w=canvas.width=innerWidth;h=canvas.height=innerHeight});
class P{
  constructor(){this.reset();this.y=Math.random()*h}
  reset(){this.x=Math.random()*w;this.y=-10;this.s=Math.random()*2+0.5;this.sp=Math.random()*0.3+0.08;this.o=Math.random()*0.4+0.15;this.t=Math.random()>0.7?'g':'e'}
  up(){this.y+=this.sp;this.x+=Math.sin(this.y*0.01)*0.2;if(this.y>h+10)this.reset()}
  dr(){
    ctx.beginPath();
    ctx.fillStyle=this.t==='g'?`rgba(232,204,122,${this.o})`:`rgba(0,168,107,${this.o*0.5})`;
    ctx.shadowBlur=this.t==='g'?6:3;
    ctx.shadowColor=this.t==='g'?'rgba(212,168,67,0.5)':'rgba(0,168,107,0.3)';
    ctx.arc(this.x,this.y,this.s,0,Math.PI*2);ctx.fill()
  }
}
for(let i=0;i<60;i++)p.push(new P());
(function A(){ctx.clearRect(0,0,w,h);p.forEach(x=>{x.up();x.dr()});requestAnimationFrame(A)})();

// Language
function setLang(l){
  document.body.className='lang-'+l;
  document.getElementById('btn-es').classList.toggle('active',l==='es');
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  localStorage.setItem('samantha_admin_lang',l);
}
setLang(localStorage.getItem('samantha_admin_lang')||'es');

// Data
function G(){return JSON.parse(localStorage.getItem('samantha_rsvp')||'[]')}
function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

function refresh(){
  const E=G(),isEs=document.body.classList.contains('lang-es');
  const L={
    t:isEs?'Total Invitados':'Total Guests',
    y:isEs?'Confirmados ✨':'Confirmed ✨',
    n:isEs?'No Asisten':'Declined',
    m:isEs?'Tal Vez':'Maybe',
    p:isEs?'Total Personas (est.)':'Est. Headcount',
    a:isEs?'Asistirá':'Attending',
    d:isEs?'No Asiste':'Declined',
    h:isEs?'Tal Vez':'Maybe'
  };
  const yes=E.filter(e=>e.attending==='yes').length;
  const no=E.filter(e=>e.attending==='no').length;
  const maybe=E.filter(e=>e.attending==='maybe').length;
  const tg=E.filter(e=>e.attending==='yes').reduce((s,e)=>s+(e.guests||0),0);

  document.getElementById('stats-bar').innerHTML=`
    <div class="stat-card"><div class="stat-num">${E.length}</div><div class="stat-label">${L.t}</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#4ade80">${yes}</div><div class="stat-label">${L.y}</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#f87171">${no}</div><div class="stat-label">${L.n}</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#facc15">${maybe}</div><div class="stat-label">${L.m}</div></div>
    <div class="stat-card"><div class="stat-num">${tg+yes}</div><div class="stat-label">${L.p}</div></div>`;

  const bc={yes:'badge-yes',no:'badge-no',maybe:'badge-maybe'};
  const bt={yes:L.a,no:L.d,maybe:L.h};

  if(!E.length){
    document.getElementById('entries').innerHTML=`<div class="empty-state"><span class="icon">🦋</span><p>${isEs?'Aún no hay confirmaciones.<br>Comparte el enlace de la invitación.':'No RSVPs yet.<br>Share the invitation link.'}</p></div>`;
    return;
  }
  document.getElementById('entries').innerHTML=E.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)).map(e=>`
    <div class="entry-card">
      <div class="entry-top">
        <span class="entry-name">${esc(e.name)}</span>
        <span class="entry-badge ${bc[e.attending]||''}">${bt[e.attending]||e.attending}</span>
      </div>
      <div class="entry-details">
        ${e.email?`<span>📧 ${esc(e.email)}</span>`:''}
        ${e.phone?`<span>📞 ${esc(e.phone)}</span>`:''}
        ${e.guests>0?`<span>👥 +${e.guests} ${isEs?'acomp.':'guest(s)'}</span>`:''}
      </div>
      ${e.message?`<div class="entry-message">"${esc(e.message)}"</div>`:''}
      <div class="entry-time">${new Date(e.timestamp).toLocaleString(isEs?'es-US':'en-US',{dateStyle:'long',timeStyle:'short'})}</div>
    </div>`).join('');
}

function exportCSV(){
  const E=G();if(!E.length)return;
  const r=[['Name','Email','Phone','Attending','Guests','Message','Date']];
  E.forEach(e=>r.push([e.name,e.email||'',e.phone||'',e.attending,e.guests||0,e.message||'',new Date(e.timestamp).toLocaleString()]));
  const csv=r.map(r=>r.map(c=>'"'+(c+'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='samantha-quince-rsvp.csv';a.click();URL.revokeObjectURL(u);
}

function wipe(){
  if(confirm(document.body.classList.contains('lang-es')?'¿Borrar TODAS las confirmaciones?':'Delete ALL RSVPs?')){
    if(confirm(document.body.classList.contains('lang-es')?'¿Completamente seguro?':'Are you absolutely sure?')){
      localStorage.removeItem('samantha_rsvp');refresh();
    }
  }
}
refresh();setInterval(refresh,30000);
</script>
</body>
</html>
