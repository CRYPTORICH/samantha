<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samantha — Guest Registry</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#001a0d}
body{
  background:#001a0d;
  color:#fdf8f0;
  font-family:'Cormorant Garamond',Georgia,serif;
  min-height:100vh;
}
.container{max-width:900px;margin:0 auto;padding:50px 24px 80px}

/* Language toggle */
.toggle{text-align:right;padding:0 24px 12px}
.toggle button{
  font-family:'Montserrat',sans-serif;font-size:0.65rem;letter-spacing:2px;
  padding:8px 16px;border:1px solid #d4a843;background:transparent;
  color:#d4a843;cursor:pointer;margin-left:4px;text-transform:uppercase;
}
.toggle button.on{background:#d4a843;color:#001a0d}

.lang-es,.lang-en{display:none}
body.es .lang-es{display:block}
body.en .lang-en{display:block}
body.es .lang-es-i,body.en .lang-en-i{display:inline}
.lang-es-i,.lang-en-i{display:none}

/* Header */
.header{
  text-align:center;margin-bottom:36px;padding-bottom:24px;
  border-bottom:1px solid rgba(212,168,67,0.15);
}
.header h1{
  font-family:'Great Vibes',cursive;font-size:3rem;
  color:#f0d060;font-weight:400;margin-bottom:4px;
}
.header p{
  font-family:'Montserrat',sans-serif;font-size:0.65rem;
  letter-spacing:3px;color:#d4a843;text-transform:uppercase;
}

/* Stats */
.stats{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.stat{
  flex:1;min-width:130px;background:rgba(0,0,0,0.4);
  border:1px solid rgba(212,168,67,0.15);padding:22px 14px;text-align:center;
}
.stat-num{font-family:'Montserrat',sans-serif;font-size:2.2rem;font-weight:700;color:#f0d060;line-height:1}
.stat-label{font-family:'Montserrat',sans-serif;font-size:0.55rem;letter-spacing:2px;color:#d4a843;text-transform:uppercase;margin-top:6px}

/* Actions */
.actions{display:flex;gap:10px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.btn{
  font-family:'Montserrat',sans-serif;font-size:0.6rem;letter-spacing:2px;
  text-transform:uppercase;font-weight:600;padding:10px 22px;
  border:1px solid rgba(212,168,67,0.25);background:rgba(0,0,0,0.4);
  color:#d4a843;cursor:pointer;
}
.btn.gold{background:#d4a843;color:#001a0d;border-color:#d4a843}
.btn.red{border-color:rgba(248,113,113,0.3);color:#f87171}

/* Entries */
.entry{
  background:rgba(0,0,0,0.35);border:1px solid rgba(212,168,67,0.1);
  padding:20px 24px;margin-bottom:10px;
}
.entry-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px}
.entry-name{font-size:1.2rem;color:#e8cc7a;font-weight:600}
.badge{
  font-family:'Montserrat',sans-serif;font-size:0.5rem;letter-spacing:2px;
  text-transform:uppercase;padding:4px 12px;font-weight:600;
}
.b-yes{background:rgba(0,180,100,0.15);color:#4ade80;border:1px solid rgba(74,222,128,0.15)}
.b-no{background:rgba(200,80,80,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.15)}
.b-maybe{background:rgba(200,160,40,0.15);color:#facc15;border:1px solid rgba(250,204,21,0.15)}
.entry-info{margin-top:8px;font-size:0.9rem;color:rgba(253,248,240,0.6);display:flex;gap:20px;flex-wrap:wrap}
.entry-msg{margin-top:8px;font-style:italic;color:rgba(253,248,240,0.4);font-size:0.9rem;padding:8px 0 0;border-top:1px solid rgba(212,168,67,0.06)}
.entry-time{font-family:'Montserrat',sans-serif;font-size:0.5rem;color:rgba(253,248,240,0.25);margin-top:8px}

.empty{text-align:center;padding:80px 20px;opacity:0.5}
.empty .icon{font-size:3rem;margin-bottom:12px;display:block}

.back{text-align:center;margin-top:36px;padding-top:20px;border-top:1px solid rgba(212,168,67,0.08);font-size:0.7rem;opacity:0.35}
.back a{color:#f5e6c8}

@media(max-width:600px){.stats{flex-direction:column}.entry-top{flex-direction:column}}
</style>
</head>
<body class="es">

<div class="toggle">
  <button id="btn-es" class="on" onclick="setLang('es')">ES</button>
  <button id="btn-en" onclick="setLang('en')">EN</button>
</div>

<div class="container">
  <div class="header">
    <h1>Samantha</h1>
    <p><span class="lang-es">Registro de Invitados — Quince Años</span><span class="lang-en">Guest Registry — Sweet Fifteen</span></p>
  </div>

  <div class="stats" id="stats"></div>

  <div class="actions">
    <button class="btn gold" onclick="exportCSV()">📥 <span class="lang-es-i">Exportar CSV</span><span class="lang-en-i">Export CSV</span></button>
    <button class="btn" onclick="refresh()">🔄 <span class="lang-es-i">Actualizar</span><span class="lang-en-i">Refresh</span></button>
    <button class="btn red" onclick="wipe()">🗑️ <span class="lang-es-i">Limpiar</span><span class="lang-en-i">Clear</span></button>
  </div>

  <div id="entries"></div>
  <div class="back"><a href=".">← <span class="lang-es-i">Volver</span><span class="lang-en-i">Back</span></a></div>
</div>

<script>
function setLang(l){
  document.body.className=l;
  document.getElementById('btn-es').className=l==='es'?'on':'';
  document.getElementById('btn-en').className=l==='en'?'on':'';
  try{localStorage.setItem('alang',l)}catch(e){}
}
try{setLang(localStorage.getItem('alang')||'es')}catch(e){setLang('es')}

function G(){try{return JSON.parse(localStorage.getItem('srsvp')||'[]')}catch(e){return[]}}
function esc(t){var d=document.createElement('div');d.textContent=t;return d.innerHTML}

function refresh(){
  var E=G(),es=document.body.className==='es';
  var L={
    t:es?'Total Invitados':'Total Guests',
    y:es?'Confirmados':'Confirmed',
    n:es?'No Asisten':'Declined',
    m:es?'Tal Vez':'Maybe',
    p:es?'Personas (est.)':'Est. Headcount',
    a:es?'Asistirá':'Attending',
    d:es?'No Asiste':'Declined',
    h:es?'Tal Vez':'Maybe'
  };
  var ye=E.filter(function(e){return e.attending==='yes'}).length;
  var no=E.filter(function(e){return e.attending==='no'}).length;
  var mb=E.filter(function(e){return e.attending==='maybe'}).length;
  var tg=E.filter(function(e){return e.attending==='yes'}).reduce(function(s,e){return s+(e.guests||0)},0);

  document.getElementById('stats').innerHTML=
    '<div class="stat"><div class="stat-num">'+E.length+'</div><div class="stat-label">'+L.t+'</div></div>'+
    '<div class="stat"><div class="stat-num" style="color:#4ade80">'+ye+'</div><div class="stat-label">'+L.y+'</div></div>'+
    '<div class="stat"><div class="stat-num" style="color:#f87171">'+no+'</div><div class="stat-label">'+L.n+'</div></div>'+
    '<div class="stat"><div class="stat-num" style="color:#facc15">'+mb+'</div><div class="stat-label">'+L.m+'</div></div>'+
    '<div class="stat"><div class="stat-num">'+(tg+ye)+'</div><div class="stat-label">'+L.p+'</div></div>';

  var bc={yes:'b-yes',no:'b-no',maybe:'b-maybe'};
  var bt={yes:L.a,no:L.d,maybe:L.h};

  if(!E.length){
    document.getElementById('entries').innerHTML='<div class="empty"><span class="icon">🦋</span><p>'+(es?'Aún no hay confirmaciones.':'No RSVPs yet.')+'</p></div>';
    return;
  }
  document.getElementById('entries').innerHTML=E.sort(function(a,b){return new Date(b.ts)-new Date(a.ts)}).map(function(e){
    return '<div class="entry">'+
      '<div class="entry-top"><span class="entry-name">'+esc(e.name)+'</span><span class="badge '+(bc[e.attending]||'')+'">'+(bt[e.attending]||e.attending)+'</span></div>'+
      '<div class="entry-info">'+
        (e.email?'<span>📧 '+esc(e.email)+'</span>':'')+
        (e.phone?'<span>📞 '+esc(e.phone)+'</span>':'')+
        (e.guests>0?'<span>👥 +'+e.guests+' '+(es?'acomp.':'guest(s)')+'</span>':'')+
      '</div>'+
      (e.message?'<div class="entry-msg">"'+esc(e.message)+'"</div>':'')+
      '<div class="entry-time">'+new Date(e.ts).toLocaleString(es?'es-US':'en-US',{dateStyle:'long',timeStyle:'short'})+'</div>'+
    '</div>';
  }).join('');
}

function exportCSV(){
  var E=G();if(!E.length)return;
  var r=[['Name','Email','Phone','Attending','Guests','Message','Date']];
  E.forEach(function(e){r.push([e.name,e.email||'',e.phone||'',e.attending,e.guests||0,e.message||'',new Date(e.ts).toLocaleString()])});
  var csv=r.map(function(r){return r.map(function(c){return'"'+(c+'').replace(/"/g,'""')+'"'}).join(',')}).join('\n');
  var b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  var u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='samantha-rsvp.csv';a.click();URL.revokeObjectURL(u);
}

function wipe(){
  if(!confirm(document.body.className==='es'?'¿Borrar TODAS las confirmaciones?':'Delete ALL RSVPs?'))return;
  if(!confirm(document.body.className==='es'?'¿Completamente seguro?':'Are you sure?'))return;
  try{localStorage.removeItem('srsvp')}catch(e){}
  refresh();
}
refresh();
setInterval(refresh,30000);
</script>
</body>
</html>
