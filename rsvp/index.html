<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RSVP List — Samantha Quince Años</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0c09;color:#ece4d4;
  font-family:'Segoe UI',system-ui,sans-serif;
  padding:40px 24px;
}
h1{font-size:1.4rem;font-weight:600;margin-bottom:4px;color:#dcc898}
.sub{font-size:0.75rem;color:rgba(236,228,212,0.4);margin-bottom:28px}
table{
  width:100%;max-width:1200px;border-collapse:collapse;
  margin:0 auto;font-size:0.85rem;
}
th{
  text-align:left;padding:10px 14px;
  font-size:0.62rem;text-transform:uppercase;letter-spacing:0.08em;
  color:rgba(0,168,107,0.5);border-bottom:1px solid rgba(196,160,74,0.12);
  font-weight:500;
}
td{
  padding:12px 14px;border-bottom:1px solid rgba(196,160,74,0.04);
  vertical-align:top;line-height:1.4;
}
tr:hover td{background:rgba(196,160,74,0.03)}
.name{font-weight:600;color:#dcc898;min-width:120px}
.phone,.email,.address{color:rgba(236,228,212,0.55);font-size:0.8rem}
.email a{color:rgba(236,228,212,0.55);text-decoration:none}
.email a:hover{color:#dcc898}
.guests{text-align:center;color:rgba(236,228,212,0.5)}
.msg{color:rgba(236,228,212,0.45);font-style:italic;max-width:220px;font-size:0.82rem}
.date{color:rgba(236,228,212,0.25);font-size:0.68rem;white-space:nowrap}
.confirmed{color:rgba(0,168,107,0.4);font-size:0.65rem}
.pending{color:rgba(196,160,74,0.3);font-size:0.65rem}
.empty{text-align:center;padding:60px;color:rgba(236,228,212,0.25)}
.count{font-size:0.75rem;color:rgba(236,228,212,0.4);margin-bottom:20px}
.count strong{color:#dcc898}
.actions{margin-bottom:20px;display:flex;gap:8px}
.btn{
  font-size:0.65rem;padding:6px 14px;
  background:rgba(196,160,74,0.08);
  border:1px solid rgba(196,160,74,0.15);
  color:#dcc898;cursor:pointer;border-radius:6px;
  transition:all 0.2s;
}
.btn:hover{background:rgba(196,160,74,0.15)}
.btn-del{
  font-size:0.6rem;padding:4px 10px;
  background:rgba(220,60,60,0.12);
  border:1px solid rgba(220,60,60,0.2);
  color:rgba(220,100,100,0.7);cursor:pointer;border-radius:5px;
  transition:all 0.2s;
}
.btn-del:hover{background:rgba(220,60,60,0.25);color:#f88}
.back{margin-top:32px;padding-top:16px;border-top:1px solid rgba(196,160,74,0.06)}
.back a{color:rgba(236,228,212,0.25);text-decoration:none;font-size:0.7rem}
.back a:hover{color:rgba(236,228,212,0.5)}
</style>
</head>
<body>

<h1>Samantha · Quince Años</h1>
<p class="sub">Guest Registry</p>

<div class="actions">
  <button class="btn" onclick="refresh()">Refresh</button>
  <button class="btn" onclick="exportCSV()">Export CSV</button>
</div>

<p class="count" id="count"></p>

<table id="table">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Address</th>
      <th style="text-align:center">Guests</th>
      <th>Message</th>
      <th>Date</th>
      <th>Email</th>
      <th style="text-align:center;width:50px"></th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<div class="back"><a href="../">← Back to invitation</a></div>

<script>
var allData = [];

function load(){
  // Read directly from GitHub Pages — always live, no Render cold start
  fetch('https://raw.githubusercontent.com/CRYPTORICH/samantha/main/rsvp_data.json')
    .then(function(r){return r.json()})
    .then(function(data){
      allData = data;
      render(data);
    })
    .catch(function(){
      // Last resort: try Render (if GitHub Pages hasn't updated yet)
      fetch('https://samantha-rsvp.onrender.com/rsvp')
        .then(function(r){return r.json()})
        .then(function(d2){allData=d2; render(d2);})
        .catch(function(){render([]);});
    });
}

function render(data){
  var tbody=document.getElementById('tbody');
  document.getElementById('count').innerHTML='<strong>'+data.length+'</strong> confirmed guests';

  if(!data.length){
    tbody.innerHTML='<tr><td colspan="9" class="empty">No RSVPs yet.</td></tr>';
    return;
  }

  tbody.innerHTML=data.sort(function(a,b){return new Date(b.date)-new Date(a.date)}).map(function(r,i){
    var id = r._id||('idx'+i);
    return '<tr>'+
      '<td class="name">'+(i+1)+'. '+esc(r.name)+'</td>'+
      '<td class="phone">'+(r.phone?esc(r.phone):'—')+'</td>'+
      '<td class="email">'+(r.email?'<a href="mailto:'+esc(r.email)+'">'+esc(r.email)+'</a>':'—')+'</td>'+
      '<td class="address">'+(r.address?esc(r.address):'—')+'</td>'+
      '<td class="guests">'+(r.guests||0)+'</td>'+
      '<td class="msg">'+(r.message?'"'+esc(r.message)+'"':'—')+'</td>'+
      '<td class="date">'+fmt(r.date)+'</td>'+
      '<td class="'+(r.confirmation_sent?'confirmed':'pending')+'">'+(r.confirmation_sent?'✓ sent':'—')+'</td>'+
      '<td style="text-align:center"><button class="btn-del" onclick="del(\''+id+'\',\''+esc(r.name)+'\')" title="Delete">✕</button></td>'+
      '</tr>';
  }).join('');
}

function del(id, name){
  if(!confirm('Delete RSVP from '+name+'?')) return;
  fetch('https://samantha-rsvp.onrender.com/rsvp/'+id, {method:'DELETE'})
    .then(function(r){return r.json()})
    .then(function(data){
      if(data.ok) load();
      else alert('Failed to delete');
    })
    .catch(function(){alert('Delete failed — server may be down')});
}

function esc(s){
  var d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function fmt(d){
  try{return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}catch(e){return d}
}

window.refresh=load;

function exportCSV(){
  if(!allData.length)return;
  var rows=[['#','Name','Phone','Email','Address','Guests','Message','Date','Confirmation Sent']];
  allData.forEach(function(r,i){
    rows.push([i+1,r.name,r.phone||'',r.email||'',r.address||'',r.guests||0,r.message||'',new Date(r.date).toLocaleString(),r.confirmation_sent?'Yes':'No']);
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"'}).join(',')}).join('\n');
  var b=new Blob(['\uFEFF'+csv],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(b);
  a.download='samantha-rsvp.csv';a.click();
}

load();
</script>
</body>
</html>
